name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            git fetch --force --tags origin
            git rev-parse -q --verify "refs/tags/${tag}" >/dev/null
            allow_version_mismatch="true"
          else
            tag="${GITHUB_REF_NAME}"
            allow_version_mismatch="false"
          fi

          notes_file="docs/releases/${tag}.md"

          if [ ! -f "${notes_file}" ]; then
            echo "::error::Missing release notes file: ${notes_file}"
            exit 1
          fi

          title="$(head -n 1 "${notes_file}" | sed 's/^# //')"

          if [ -z "${title}" ]; then
            echo "::error::Release notes title is empty: ${notes_file}"
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"
          echo "title=${title}" >> "${GITHUB_OUTPUT}"
          echo "allow_version_mismatch=${allow_version_mismatch}" >> "${GITHUB_OUTPUT}"

      - name: Verify release consistency
        shell: bash
        run: |
          set -euo pipefail

          args=(--tag "${{ steps.meta.outputs.tag }}")

          if [ "${{ steps.meta.outputs.allow_version_mismatch }}" = "true" ]; then
            args+=(--allow-version-mismatch)
          fi

          npm run release:check -- "${args[@]}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.title }}
          RELEASE_NOTES_FILE: ${{ steps.meta.outputs.notes_file }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${RELEASE_NOTES_FILE}"
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${RELEASE_NOTES_FILE}"
          fi
