name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
            git checkout "${tag}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          notes_file="docs/releases/${tag}.md"

          if [ ! -f "${notes_file}" ]; then
            echo "::error::Missing release notes file: ${notes_file}"
            exit 1
          fi

          title="$(head -n 1 "${notes_file}" | sed 's/^# //')"

          if [ -z "${title}" ]; then
            echo "::error::Release notes title is empty: ${notes_file}"
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"
          echo "title=${title}" >> "${GITHUB_OUTPUT}"

      - name: Verify release consistency
        run: npm run release:check -- --tag "${{ steps.meta.outputs.tag }}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.title }}
          RELEASE_NOTES_FILE: ${{ steps.meta.outputs.notes_file }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${RELEASE_NOTES_FILE}"
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${RELEASE_NOTES_FILE}"
          fi
